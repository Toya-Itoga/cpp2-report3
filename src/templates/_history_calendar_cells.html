{% for cell in calendar_cells %}
{% if cell.day %}
<div
  class="cal-cell
    {% if cell.is_today %}cal-cell--today{% endif %}
    {% if cell.is_weekend %}{% endif %}"
  :class="{ 'cal-cell--selected': selectedDay === {{ cell.day }} }"
  @click="selectDay({{ cell.day }}, {{ cell.record | tojson }})"
  style="cursor: pointer;"
>
  <span
    class="cal-cell__day {% if cell.col == 0 %}cal-cell__day--sun{% elif cell.col == 6 %}cal-cell__day--sat{% endif %}"
    style="font-weight: {% if cell.is_today %}700{% else %}400{% endif %};"
  >{{ cell.day }}</span>

  {% if cell.record %}
  <div style="position: absolute; bottom: 6px; left: 6px; right: 6px;">
    <span class="cal-cell__hours">{{ cell.record.work_hours_label }}</span>
    <div class="cal-cell__bar">
      <div class="cal-cell__bar-fill" style="width: {{ cell.record.bar_pct }}%;"></div>
    </div>
  </div>
  {% endif %}
</div>
{% else %}
<div class="cal-cell cal-cell--empty"></div>
{% endif %}
{% endfor %}
