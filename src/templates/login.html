<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ログイン | Kintai</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />

  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 40px 16px;
    }
    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .login-logo__icon {
      width: 64px;
      height: 64px;
      background: var(--accent);
      border: 2.25px solid var(--ink);
      border-radius: 7px 5px 8px 6px / 6px 8px 5px 7px;
      box-shadow: 3px 3px 0 var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
    }
    .login-logo__name  { font-size: 36px; font-weight: 700; }
    .login-logo__tagline { font-size: 14px; color: var(--ink2); font-style: italic; }

    .login-card {
      background: #fffdf6;
      border: 2.25px solid var(--ink);
      border-radius: 7px 9px 8px 6px / 8px 6px 9px 7px;
      box-shadow: 4px 4px 0 var(--ink);
      padding: 40px;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }
    .login-card__title { font-size: 22px; font-weight: 700; }
    .login-forgot { font-size: 12px; color: var(--ink3); font-style: italic; text-decoration: none; }
    .login-forgot:hover { color: var(--ink2); }

    .error-msg {
      background: #fde8e8;
      border: 1.75px solid #c04444;
      border-radius: 5px 7px 5px 6px / 6px 5px 7px 5px;
      padding: 10px 14px;
      font-size: 14px;
      color: #c04444;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <!-- ロゴ -->
    <div class="login-logo">
      <div class="login-logo__icon">K</div>
      <span class="login-logo__name">Kintai</span>
      <span class="login-logo__tagline">あなたの時間を、ちゃんと記録。</span>
    </div>

    <!-- ログインカード -->
    <div class="login-card">
      <h1 class="login-card__title">ログイン</h1>

      {% if error %}
      <div class="error-msg">{{ error }}</div>
      {% endif %}

      <form method="post" action="/auth/login" class="flex flex-col gap-24" style="gap: 22px;">
        <div class="field">
          <label class="field__label" for="user_name">ユーザー名</label>
          <input
            class="field__input"
            id="user_name"
            name="user_name"
            type="text"
            placeholder="例: admin"
            autocomplete="username"
            required
          />
        </div>

        <div class="field">
          <label class="field__label" for="password">パスワード</label>
          <input
            class="field__input"
            id="password"
            name="password"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <div style="display: flex; justify-content: flex-end;">
          <a href="/auth/forgot" class="login-forgot">パスワードを忘れた？</a>
        </div>

        <button type="submit" class="btn btn--accent">ログイン →</button>
      </form>
    </div>
  </div>
</body>
</html>
