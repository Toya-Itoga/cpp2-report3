<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Kintai{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
  <!-- Alpine.js -->
  <script src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js" defer></script>

  {% block head %}{% endblock %}
</head>
<body>
  {% if not hide_nav %}
  <nav class="nav">
    <a href="/dashboard" class="nav__brand">Kintai</a>
    <a href="/dashboard" class="nav__link {% if active == 'dashboard' %}nav__link--active{% endif %}">ダッシュボード</a>
    <a href="/punch"    class="nav__link {% if active == 'punch'     %}nav__link--active{% endif %}">打刻</a>
    <a href="/history"  class="nav__link {% if active == 'history'   %}nav__link--active{% endif %}">勤務履歴</a>
    <a href="/settings" class="nav__link {% if active == 'settings'  %}nav__link--active{% endif %}">設定</a>
    <span class="nav__user">{{ user.user_name }} さん</span>
  </nav>
  {% endif %}

  {% block content %}{% endblock %}

  {% block scripts %}{% endblock %}
</body>
</html>
